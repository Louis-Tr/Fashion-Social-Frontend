name: Build and Deploy iOS

on:
  workflow_dispatch:

concurrency:
  group: ios-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-ios:
    name: Build and Deploy iOS (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          EXPO_PUBLIC_AWS_REGION=${{ secrets.EXPO_PUBLIC_AWS_REGION }}
          EXPO_PUBLIC_LOCALHOST_ANDROID=${{ secrets.EXPO_PUBLIC_LOCALHOST_ANDROID }}
          EXPO_PUBLIC_LOCALHOST_IOS=${{ secrets.EXPO_PUBLIC_LOCALHOST_IOS }}
          EXPO_PUBLIC_USER_POOL_CLIENT_ID=${{ secrets.EXPO_PUBLIC_USER_POOL_CLIENT_ID }}
          EXPO_PUBLIC_USER_POOL_ID=${{ secrets.EXPO_PUBLIC_USER_POOL_ID }}
          EOF

      - name: Write App Store Connect API key
        run: |
          mkdir -p .secrets
          printf "%s" "${{ secrets.ASC_API_KEY_P8 }}" > .secrets/AuthKey.p8
          chmod 600 .secrets/AuthKey.p8

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Trigger iOS production build and auto-submit
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --auto-submit \
            --wait